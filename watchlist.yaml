# NSE sector watchlist — symbols use .NS suffix via prices module
sectors:
  - name: Defence
    stocks:
      - symbol: GRSE
        name: Garden Reach Shipbuilders
        query: "Garden Reach Shipbuilders GRSE"
      - symbol: PARAS
        name: Paras Defence and Space
        query: "Paras Defence PARAS"
      - symbol: KRISHNADEF
        name: Krishna Defence and Allied
        query: "Krishna Defence KRISHNADEF"

  - name: Electronics / EMS
    stocks:
      - symbol: DIXON
        name: Dixon Technologies
        query: "Dixon Technologies DIXON"
      - symbol: NETWEB
        name: Netweb Technologies
        query: "Netweb Technologies NETWEB"

  - name: IT / Software / AI
    stocks:
      - symbol: RATEGAIN
        name: RateGain Travel Technologies
        query: "RateGain RATEGAIN"
      - symbol: FRACTAL
        name: Fractal Analytics
        query: "Fractal Analytics FRACTAL"

  - name: Telecom
