      - symbol: IDEA
        name: Vodafone Idea
        query: "\"Vodafone Idea\" OR \"Vodafone-Idea\" stock share"
      - symbol: BHARTIARTL
        name: Bharti Airtel
        query: "\"Bharti Airtel\" OR BHARTIARTL stock"

  - name: Consumer / Retail
    stocks:
      - symbol: MEESHO
        name: Meesho
        query: "Meesho MEESHO stock"
