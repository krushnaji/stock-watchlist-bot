# Near-real-time watchlist alerts → Telegram (weekdays, market hours window)
# Note: GitHub Actions cron can be delayed by a few minutes (sometimes more) under load.

name: Monitor

on:
  schedule:
    # Every 20 minutes from 03:00–10:59 UTC ≈ 08:30–16:30 IST (covers NSE hours)
    - cron: "*/20 3-10 * * 1-5"
  workflow_dispatch:

concurrency:
  group: stock-watchlist-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main --mode monitor

      - name: Commit & push state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/seen_news.json state/last_prices.json

          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "chore: update monitor state [skip ci]"

          # Rebase onto remote before push to avoid rejected non-fast-forward
          git pull --rebase origin "${GITHUB_REF_NAME}" || git pull --rebase origin HEAD
          git push
